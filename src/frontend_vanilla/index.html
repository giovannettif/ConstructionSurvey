<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protecting Under the Hard Hat</title>
  <link rel="stylesheet" href="static/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Custom styles for the landing page */
    .landing-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
    }

    .landing-card {
      background: var(--bg-secondary);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-a);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    .landing-logo {
      max-width: 200px;
      margin-bottom: 30px;
    }

    .landing-text {
      color: var(--text-secondary);
      margin-bottom: 40px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="landing-container">
    <div class="landing-card">
      <img src="static/Logo.jpg" alt="Protecting Under the Hard Hat Logo" class="landing-logo">
      <h1>Protecting Under the Hard Hat</h1>
      <p class="landing-text">
        Welcome to the Construction Industry Wellbeing Survey. This quick check takes about 1–2 minutes. It’s not a
        diagnosis, but it can point you to helpful resources.
      </p>
      <a href="/questionnaire" class="begin-btn" style="text-decoration: none; display: inline-block;">Take the
        Survey</a>
    </div>

    <footer class="footer-branding" style="border: none; margin-top: 50px;">
      <img src="static/New_Jersey_IT_logo.svg" alt="NJIT Logo" class="njit-logo-footer">
    </footer>
  </div>
</body>

</html>
